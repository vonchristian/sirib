# PostgreSQL configuration for 2GB RAM droplet
# Sirib Cooperative Banking System

# Memory
shared_buffers = 512MB
effective_cache_size = 1GB
work_mem = 8MB
maintenance_work_mem = 128MB
wal_buffers = 4MB

# Connections
listen_addresses = '*'
max_connections = 20

# Storage/SSD
random_page_cost = 1.1
effective_io_concurrency = 200

# WAL
min_wal_size = 1GB
max_wal_size = 4GB

# Parallelism
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4

# Background
autovacuum_max_workers = 2
autovacuum_naptime = 1min

# Logging
log_min_duration_statement = 1000
log_checkpoints = on

# Tracking
track_activities = on
track_counts = on
track_io_timing = off
track_functions = none
track_activity_query_size = 512
