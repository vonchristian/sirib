# PostgreSQL configuration for 512MB RAM droplet
# Sirib Cooperative Banking System

# Memory
shared_buffers = 64MB
effective_cache_size = 128MB
work_mem = 2MB
maintenance_work_mem = 64MB
wal_buffers = 512kB

# Connections
listen_addresses = '*'
max_connections = 10

# Storage/SSD
random_page_cost = 1.1
effective_io_concurrency = 200

# WAL
min_wal_size = 80MB
max_wal_size = 1GB

# Parallelism (single vCPU)
max_worker_processes = 2
max_parallel_workers_per_gather = 0
max_parallel_workers = 2

# Query tuning
geqo = off
from_collapse_limit = 4
join_collapse_limit = 4

# Background
autovacuum_max_workers = 1
autovacuum_naptime = 2min
autovacuum_vacuum_scale_factor = 0.02
autovacuum_analyze_scale_factor = 0.01

# Logging
log_min_duration_statement = 1000
log_checkpoints = on

# Tracking
track_activities = on
track_counts = on
track_io_timing = off
track_functions = none
track_activity_query_size = 512
